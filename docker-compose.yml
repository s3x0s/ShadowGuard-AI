version: '3.8'
services:
  backend:
    build: {context: ., dockerfile: backend/Dockerfile}
    ports: ["8000:8000"]
    volumes: ["./backend:/app/backend", "backend_data:/app/data"]
  dashboard:
    build: {context: ., dockerfile: dashboard/Dockerfile}
    ports: ["3000:80"]
    depends_on: [backend]
volumes:
  backend_data:
